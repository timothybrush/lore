name: Deploy Lore docs to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - docs/**
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/configure-pages@v5
      - run: >
          uvx
          --with mkdocs-material
          --with mkdocs-awesome-pages-plugin
          --with mkdocs-section-index
          --with markdown-gfm-admonition
          mkdocs build --strict
        env:
          DISABLE_MKDOCS_2_WARNING: "true"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
